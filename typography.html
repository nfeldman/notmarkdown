<style>
  /* Devbook markdown export — self-contained typography, no web fonts fetched.
     Uses durable system font stacks so the file needs zero network, ever. */
  :root { color-scheme: light dark; }
  html { font-size: 18px; -webkit-text-size-adjust: 100%; }
  body {
    max-width: 44rem;
    margin: 3rem auto;
    padding: 0 1.25rem;
    font-family: "Iowan Old Style", Palatino, "Palatino Linotype", Georgia, "Times New Roman", serif;
    line-height: 1.6;
    color: #1a1a1a;
    background: #fdfdfc;
    text-rendering: optimizeLegibility;
    font-feature-settings: "kern", "liga", "onum";
    -webkit-font-smoothing: antialiased;
    hyphens: auto;
  }
  @media (prefers-color-scheme: dark) {
    body { color: #e6e6e6; background: #1a1a1a; }
    a { color: #8ab4f8; }
  }
  h1, h2, h3, h4 { line-height: 1.25; font-weight: 600; margin-top: 2em; }
  h1 { font-size: 1.9em; } h2 { font-size: 1.5em; } h3 { font-size: 1.25em; }
  p, li { overflow-wrap: break-word; }
  a { color: #0b57d0; text-underline-offset: 2px; }
  code, pre { font-family: "SF Mono", Menlo, Consolas, "DejaVu Sans Mono", monospace; font-size: 0.9em; }
  pre { background: rgba(128,128,128,0.12); padding: 1rem; overflow-x: auto; border-radius: 6px; line-height: 1.45; }
  :not(pre) > code { background: rgba(128,128,128,0.15); padding: 0.1em 0.35em; border-radius: 4px; }
  img, svg { max-width: 100%; height: auto; }
  table { border-collapse: collapse; margin: 1em 0; }
  th, td { border: 1px solid rgba(128,128,128,0.4); padding: 0.4em 0.7em; text-align: left; }
  blockquote { border-left: 3px solid rgba(128,128,128,0.5); margin: 1em 0; padding-left: 1rem; opacity: 0.85; }
  hr { border: none; border-top: 1px solid rgba(128,128,128,0.35); margin: 2.5em 0; }
  /* MathML: name a real OpenType MATH font so Chromium (which ships none) renders
     correctly. macOS and most systems have STIX Two Math; `math` is the generic
     fallback that modern browsers map to their own math font. */
  math { font-family: "STIX Two Math", "Latin Modern Math", "Cambria Math", math; font-size: 1.05em; }
</style>
