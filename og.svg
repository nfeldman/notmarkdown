<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg" cx="28%" cy="34%" r="90%">
      <stop offset="0" stop-color="#231a10"/>
      <stop offset="55%" stop-color="#181209"/>
      <stop offset="100%" stop-color="#100b06"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="46%" r="55%">
      <stop offset="0" stop-color="#f9b13a" stop-opacity=".28"/>
      <stop offset="100%" stop-color="#f9b13a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="amber" cx="40%" cy="32%" r="80%">
      <stop offset="0" stop-color="#fff1c9"/><stop offset=".28" stop-color="#fbc02d"/>
      <stop offset=".6" stop-color="#ef9a1a"/><stop offset=".86" stop-color="#c85f10"/>
      <stop offset="1" stop-color="#8f3d0a"/>
    </radialGradient>
    <linearGradient id="node" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#803713"/><stop offset="1" stop-color="#4d1e07"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="270" cy="300" r="300" fill="url(#glow)"/>

  <!-- drop mark -->
  <svg x="118" y="150" width="220" height="330" viewBox="330 250 364 575">
    <path d="M512 270 L669 522 A185 185 0 1 1 355 522 Z" fill="url(#amber)"/>
    <g stroke="url(#node)" fill="url(#node)">
      <line x1="512" y1="576" x2="440" y2="686" stroke-width="14"/>
      <line x1="512" y1="576" x2="586" y2="686" stroke-width="14"/>
      <circle cx="512" cy="576" r="30"/><circle cx="440" cy="686" r="27"/><circle cx="586" cy="686" r="27"/>
    </g>
    <g fill="#ffd98a" opacity=".55"><circle cx="504" cy="567" r="10"/><circle cx="433" cy="678" r="9"/><circle cx="579" cy="678" r="9"/></g>
  </svg>

  <!-- text block -->
  <g font-family="'Helvetica Neue',Helvetica,Arial,sans-serif">
    <text x="410" y="222" fill="#f4a52b" font-size="30" font-weight="700" letter-spacing="6">NOTMARKDOWN</text>
    <text x="408" y="312" fill="#f6f1e7" font-size="72" font-weight="800" letter-spacing="-1.5">Markdown is for drafts.</text>
    <text x="408" y="392" fill="#f6a821" font-size="72" font-weight="800" letter-spacing="-1.5">Markup is forever.</text>
    <text x="410" y="470" fill="#b9ac97" font-size="30" font-weight="500">Self-contained HTML &#183; PDF &#183; EPUB</text>
    <text x="410" y="512" fill="#8f8574" font-size="30" font-weight="500">— Mermaid diagrams &amp; LaTeX math, baked in.</text>
  </g>
